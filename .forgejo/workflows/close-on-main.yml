name: Close PRs opened on main branch

on:
  pull_request_target:
    types: [ opened, ready_for_review ]

jobs:
  run:
    runs-on: codeberg-tiny
    if: ${{github.head_ref == 'master' || github.head_ref == 'main' || github.head_ref == 'develop'}}

    steps:
    - name: Close PR on main branch
      env:
        FJ_SERVER: ${{ forgejo.server_url }}
        FJ_TOKEN: ${{ forgejo.token }}
        PR_NUMBER: ${{ forgejo.event.pull_request.number }}
      run: |
        curl -s -f -H "Authorization: token ${FJ_TOKEN}" --request POST --data '{"body": "Thank you for contributing to Project Shortcircuit 14! It would appear that you have submitted your PR from your main branch. Consider following the [SS14 developer documentation](https://docs.spacestation14.com/en/general-development/setup/git-for-the-ss14-developer.html) to get instructions on proper GIT usage.\n\nYou can move your current work from your main branch to another branch by doing `git branch <branch_name>` and resetting the main branch."}' "${FJ_SERVER}/api/v1/repos/${FJ_REPO}/issues/${PR_NUMBER}/comments"
        curl -s -f -H "Authorization: token ${FJ_TOKEN}" --request POST --data '{"state": "closed"}' "${FJ_SERVER}/api/v1/repos/${FJ_REPO}/issues/${PR_NUMBER}"
