name: No submodule update checker

on:
  pull_request:
    paths:
      - 'RobustToolbox'

jobs:
  this_aint_right:
    name: Submodule update in pr found
    runs-on: codeberg-tiny
    steps:
      - name: Warn contributor
        env:
          FJ_SERVER: ${{ forgejo.server_url }}
          FJ_TOKEN: ${{ secrets.BOT_TOKEN }}
          FJ_REPO: ${{ forgejo.repository }}
          PR_NUMBER: ${{ forgejo.event.pull_request.number }}
        run: |
          curl -f -H 'Content-Type: application/json' -H "Authorization: token ${FJ_TOKEN}" --request POST --data '{"body": "It would appear that you accidentally included the game engine in the pull request. Please remedy this!"}' "${FJ_SERVER}/api/v1/repos/${FJ_REPO}/issues/${PR_NUMBER}/comments"
      - name: Fail
        run: exit 1
