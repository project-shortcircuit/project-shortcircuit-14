name: Update REUSE Headers

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  update_headers:
    if: "!contains(forgejo.event.commits[0].message, 'chore: Automatically update REUSE headers')"
    runs-on: codeberg-small
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ forgejo.event.pull_request.head.repo.full_name }}
          ref: ${{ forgejo.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.BOT_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get Changed Files and PR Info
        id: changed_files
        env:
           PR_BODY: ${{ forgejo.event.pull_request.body }}
           FJ_TOKEN: ${{ secrets.BOT_TOKEN }}
           FJ_REPO: ${{ forgejo.repository }}
           FJ_SERVER: ${{ forgejo.server_url }}
           PR_NUMBER: ${{ forgejo.event.pull_request.number }}
        run: |
          set -e # Exit script on first error
          echo "Fetching files for PR #${PR_NUMBER} in repo ${FJ_REPO}"
          PR_FILES_JSON=$(curl -s -f -H "Authorization: token ${FJ_TOKEN}" \
            "${FJ_SERVER}/api/v1/repos/${FJ_REPO}/pulls/${PR_NUMBER}/files")
          if [ $? -ne 0 ]; then
            echo "Error fetching PR files from Forgejo API."
            exit 1
          fi

          if ! echo "$PR_FILES_JSON" | jq -e . > /dev/null; then
             echo "Warning: Received empty or invalid JSON from Forgejo API for PR files."
             PR_FILES="" # Set PR_FILES to empty to avoid errors below
          else
             PR_FILES=$(echo "$PR_FILES_JSON" | jq -r '.[] | select(.filename != null) | "\(.status) \(.filename)"')
          fi
          if [ -z "$PR_FILES" ]; then
            echo "No files found in PR."
            ADDED_FILES=""
            MODIFIED_FILES=""
          else
            ADDED_FILES=$(echo "$PR_FILES" | grep "^added" | grep -E '\.(cs|py|sh|ya?ml)$' | sed 's/^added //' | xargs) || true
            MODIFIED_FILES=$(echo "$PR_FILES" | grep "^modified" | grep -E '\.(cs|py|sh|ya?ml)$' | sed 's/^modified //' | xargs) || true
          fi
          echo "Added Files: $ADDED_FILES"
          echo "Modified Files: $MODIFIED_FILES"
          echo "ADDED_FILES_LIST<<EOF" >> $GITHUB_ENV
          echo "$ADDED_FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "MODIFIED_FILES_LIST<<EOF" >> $GITHUB_ENV
          echo "$MODIFIED_FILES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "Checking PR body for license..."
          if grep -q "LICENSE: MIT" <<< "$PR_BODY"; then
            echo "PR_LICENSE=mit" >> $GITHUB_ENV
          elif grep -q "LICENSE: AGPL" <<< "$PR_BODY"; then
            echo "PR_LICENSE=agpl" >> $GITHUB_ENV
          elif grep -q "LICENSE: MPL" <<< "$PR_BODY"; then
            echo "PR_LICENSE=mpl" >> $GITHUB_ENV
          elif grep -q "LICENSE: CC-BY-NC-SA-3.0" <<< "$PR_BODY"; then
            echo "PR_LICENSE=cc-by-nc-sa-3.0" >> $GITHUB_ENV
          else
            echo "PR_LICENSE=mit" >> $GITHUB_ENV
            echo "No license specified in PR, using default: MIT"
          fi
      - name: Run REUSE Header Update Script
        run: |
          python Tools/update_pr_reuse_headers.py \
            --files-added ${{ env.ADDED_FILES_LIST }} \
            --files-modified ${{ env.MODIFIED_FILES_LIST }} \
            --pr-license ${{ env.PR_LICENSE }} \
            --pr-base-sha ${{ forgejo.event.pull_request.base.sha }} \
            --pr-head-sha ${{ forgejo.event.pull_request.head.sha }}
        working-directory: ${{ forgejo.workspace }}

      - name: Commit changes
        uses: https://github.com/stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Automatically update REUSE headers"
          commit_user_name: ${{ vars.CHANGELOG_USER }}
          commit_user_email: ${{ vars.CHANGELOG_EMAIL }}
          commit_author: ${{ vars.CHANGELOG_USER }} <${{ vars.CHANGELOG_EMAIL }}>
          skip_dirty_check: false
          skip_fetch: true

concurrency:
  group: reuse-updater-${{ forgejo.ref }}
  cancel-in-progress: true
