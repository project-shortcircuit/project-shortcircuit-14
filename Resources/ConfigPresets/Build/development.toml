[game]
# Straight in-game baby
lobbyenabled = false
# Dev map for faster loading & convenience
map = "Dev"
role_timers = false
admin_job_tracking = true
role_loadout_timers = false

[events]
enabled = false

[ghost]
role_time = 0.5
quick_lottery = true

[gateway]
generator_enabled = false

[movement]
mob_pushing = true

[physics]
# Makes mapping annoying
grid_splitting = false

[procgen]
preload = false

[salvage]
expedition_cooldown = 30.0

[shuttle]
grid_fill = false
auto_call_time = 0
emergency = false
arrivals = false
preload_grids = false

[admin]
see_own_notes = true
new_player_threshold = 120

[ic]
random_characters = true
random_species_weights = ""
ssd_sleep_time = 3600

[database]
# Change to postgres if needed
engine = "sqlite"
pg_host = "localhost"
pg_port = 5432
pg_database = "ss14"
pg_username = "postgres"
pg_password = "postgres"
