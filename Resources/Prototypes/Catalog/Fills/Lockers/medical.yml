# Medical supply lockers

- type: entityTable
  id: LockerFillMedicine
  table: !type:AllSelector
    children:
    - !type:NestedSelector
      tableId: CoreMedicineReagentBottleTable
      rolls: 2
    - !type:GroupSelector # Basic topicals
      rolls: 7
      children:
      - id: Brutepack
      - id: Ointment
      - id: Bloodpack
      - id: Gauze
        weight: 0.5

- type: entity
  parent: LockerMedicine
  id: LockerMedicineFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillMedicine

- type: entity
  parent: LockerWallMedical
  id: LockerWallMedicalFilled
  name: medicine wall locker
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillMedicine

# Medical role lockers

- type: entityTable
  id: LockerFillMedicalDoctor
  table: !type:AllSelector
    children:
    - id: ClothingEyesHudMedical
    - id: ClothingBeltMedicalFilled
    - id: JetInjector
    - id: HandheldHealthAnalyzer
    - id: ChemistryBottleLaughter # Widely recognized as the best medicine :o)
      prob: 0.01
    - id: PlushieLizardJobMedicaldoctor
      prob: 0.02
    - id: PlushieLizardJobMedicalintern
      prob: 0.02
    - id: PlushieLizardJobPsychologist
      prob: 0.02

- type: entity
  parent: LockerMedical
  id: LockerMedicalFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillMedicalDoctor

- type: entity
  parent: LockerWallMedical
  id: LockerWallMedicalDoctorFilled
  name: medical doctor's wall locker
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillMedicalDoctor

- type: entityTable
  id: LockerFillChemistry
  table: !type:AllSelector
    children:
    - id: ClothingEyesGlassesChemical
    - id: ChemBag
    - id: Dropper
    - id: HandLabeler
    - id: BarSpoon # Should be replaced by a stirring tool with medical theming, like a glass rod
    - id: PlasmaChemistryVial
    - !type:AllSelector # The wonderful world of chemical storage
      children:
      - id: BoxSyringe
      - id: BoxBottle
      - id: BoxVial
      - id: BoxBeaker
      - id: BoxPillCanister
      - !type:GroupSelector # Remind chemists once in a while of alternate storage options
        prob: 0.2
        children:
        - id: SprayBottle
        - id: Bucket
        - id: DrinkCartonMilk
    - id: PlushieLizardJobChemist
      prob: 0.02

- type: entity
  parent: LockerChemistry
  id: LockerChemistryFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillChemistry

- type: entityTable
  id: LockerFillParamedic
  table: !type:AllSelector
    children:
    - id: ClothingEyesHudMedical
    - id: ClothingOuterHardsuitVoidParamed
    - id: ClothingBeltMedicalEMTFilled
    - id: JetInjector
    - id: HandheldHealthAnalyzer
    - id: BoxBodyBag
    - !type:GroupSelector
      children:
      - id: RollerBedSpawnFolded
      - id: CheapRollerBedSpawnFolded
      - id: EmergencyRollerBedSpawnFolded
    - id: PlushieLizardJobParamedic
      prob: 0.02

- type: entity
  parent: LockerParamedic
  id: LockerParamedicFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: LockerFillParamedic
