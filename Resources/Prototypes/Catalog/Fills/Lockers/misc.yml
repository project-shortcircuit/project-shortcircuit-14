- type: entityTable
  id: SyndieMaintLoot
  table: !type:GroupSelector
    children:
    - !type:GroupSelector
      children:
      - id: ClothingUniformJumpsuitOperative
      - id: ClothingUniformJumpskirtOperative
    - id: ClothingBackpackDuffelSyndicate
    - id: CyberPen
    - id: CigPackSyndicate
    - id: ClothingBackpackDuffelSyndicatePyjamaBundle
    - id: ClothingBeltMilitaryWebbing
    - id: ClothingShoesBootsCombatFilled
    - id: ToolboxSyndicateFilled
    - id: BalloonSyn
    - id: WeaponSniperMosin
      weight: 2
    - id: ClothingHandsKnuckleDustersSyndicate

- type: entityTable
  id: MaintenanceLockerLoot
  table: !type:AllSelector
    children:
    - id: StrangePill
      prob: 0.20
    # Tools
    - !type:NestedSelector
      tableId: MaintToolsTable
      rolls: !type:RangeNumberSelector
        range: 1, 5
    # Fluff
    - !type:NestedSelector
      tableId: MaintFluffTable
      prob: 0.33
      rolls: !type:RangeNumberSelector
        range: 0, 2
    # Plushies
    - !type:NestedSelector
      tableId: AllPlushiesTable
      prob: 0.10
      rolls: !type:RangeNumberSelector
        range: 1, 2
    - !type:NestedSelector
      tableId: MaintenancePlushies
      prob: 0.02

    # Weapons
    - !type:NestedSelector
      tableId: MaintWeaponTable
      prob: 0.075
    # Syndie Loot
    - !type:NestedSelector
      tableId: SyndieMaintLoot
      prob: 0.05
    # Recursive
    - id: ClosetMaintenanceFilledRandom
      prob: 0.01

- type: entityTable
  id: MaintenancePlushies
  table: !type:GroupSelector
    children:
    - id: PlushieLizardJobBoxer
