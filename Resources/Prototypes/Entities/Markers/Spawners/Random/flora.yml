- type: entity
  id: RandomFloraTree
  name: random tree spawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
      - state: red
      - sprite: Objects/Decoration/Flora/flora_trees.rsi
        state: tree01
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: ShadowTree
        weight: 5
      - !type:GroupSelector
        weight: 95
        prob: 0.95
        children:
        - id: FloraTreeLarge
        - id: FloraTreeConifer
        - id: FloraTreeSnow
        - id: FloraTree
