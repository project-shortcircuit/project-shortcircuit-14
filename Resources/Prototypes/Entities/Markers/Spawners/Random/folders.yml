- type: entity
  name: Random Folder Spawner
  id: FolderSpawner
  parent: MarkerBase
  placement:
    mode: PlaceFree
  components:
  - type: Transform
    anchored: false
  - type: Sprite
    sprite: Objects/Misc/folders.rsi
    layers:
    - state: folder-base
    - state: folder-colormap
  - type: EntityTableSpawner
    offset: 0
    table: !type:GroupSelector
      children:
      - id: BoxFolderBase
      - id: BoxFolderRed
      - id: BoxFolderBlue
      - id: BoxFolderYellow
      - id: BoxFolderGrey
      - id: BoxFolderBlack
      - id: BoxFolderGreen
