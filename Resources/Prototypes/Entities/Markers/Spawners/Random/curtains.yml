- type: entity
  name: random curtain spawner
  id: CurtainSpawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Decoration/Curtains/hospital.rsi
      state: closed
  - type: EntityTableSpawner
    table: !type:GroupSelector
      children:
      - id: HospitalCurtains
      - id: CurtainsBlack
      - id: CurtainsBlue
      - id: CurtainsSkyBlue
      - id: CurtainsCyan
      - id: CurtainsGreen
      - id: CurtainsOrange
      - id: CurtainsPink
      - id: CurtainsPurple
      - id: CurtainsRed
      - id: CurtainsWhite
      - id: CurtainsWhiteOpen
      - id: CurtainsRedOpen
      - id: CurtainsPurpleOpen
      - id: CurtainsPinkOpen
      - id: CurtainsOrangeOpen
      - id: CurtainsGreenOpen
      - id: CurtainsCyanOpen
      - id: CurtainsSkyBlueOpen
      - id: CurtainsBlueOpen
      - id: CurtainsBlackOpen
      - id: HospitalCurtainsOpen
    offset: 0.0
