# generic "highly illegal" contraband; Syndicate/magical contraband are already considered highly illegal under Space Law,
# so this is mostly for stuff that should be equally illegal but doesn't need its own unique contraband tier added
- type: entity
  id: BaseHighlyIllegalContraband
  abstract: true
  components:
  - type: Contraband
    severity: HighlyIllegal

# used by the unique items of xenoborgs (like modules and stuff)
- type: entity
  id: BaseXenoborgContraband
  abstract: true
  components:
  - type: Contraband
    severity: HighlyIllegal

# any type of magical items used by wizards and similiar
- type: entity
  id: BaseMagicalContraband
  abstract: true
  components:
  - type: Contraband
    severity: Magical

# non-stealth syndicate stuff
- type: entity
  id: BaseSyndicateContraband
  abstract: true
  components:
  - type: Contraband
    severity: Syndicate
    allowedDepartments: [  ]
    allowedJobs: [  ]

# minor contraband not departmentally restricted -- improvised weapons etc
- type: entity
  id: BaseMinorContraband
  abstract: true
  components:
  - type: Contraband
    severity: Minor

# major contraband, for things like guns or weaponry that don't belong to any department and aren't syndicate specific
- type: entity
  id: BaseMajorContraband
  abstract: true
  components:
  - type: Contraband
    severity: Major

# base department restricted contraband, this should only be used as a parent for other contraband prototypes, not the restricted items themselves.
- type: entity
  id: BaseRestrictedContraband
  abstract: true
  components:
  - type: Contraband
    severity: Restricted
    allowedDepartments: [  ]
    allowedJobs: [  ]

# one department restricted contraband
- type: entity
  id: BaseCentcommContraband
  parent: BaseRestrictedContraband
  abstract: true
  components:
  - type: Contraband
    allowedDepartments: [ CentralCommand ]

- type: entity
  id: BaseCommandContraband
  parent: BaseRestrictedContraband
  abstract: true
