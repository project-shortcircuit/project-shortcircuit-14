# Special entity used to keep track of beams from the BeamComponent and what targets they collided with
- type: entity
  id: VirtualBeamEntityController
  name: BEAM ENTITY YOU SHOULD NOT SEE THIS
  categories: [ HideSpawnMenu ]
  components:
    - type: Beam
    - type: TimedDespawn
      lifetime: 4
    - type: Tag
      tags:
        - HideContextMenu
