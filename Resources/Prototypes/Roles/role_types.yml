  color: '#d82000'
  symbol: "⚔"

- type: roleType
  id: FreeAgent
  name: role-type-free-agent-name
  color: '#ffff00'
  symbol: "☯"

- type: roleType
  id: Familiar
  name: role-type-familiar-name
  color: '#6495ed'
  symbol: "🗡" # Should never be antag, but just in case.

- type: roleType
  id: Silicon
  name: role-type-silicon-name
