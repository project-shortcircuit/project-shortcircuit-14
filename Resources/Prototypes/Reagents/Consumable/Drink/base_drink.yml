- type: reagent
  id: BaseDrink
  group: Drinks
  abstract: true
  slipData:
    requiredSlipSpeed: 3.5
  metabolisms:
    Digestion:
      effects:
      - !type:SatiateThirst
        factor: 3
  reactiveEffects:
    Extinguish:
      methods: [ Touch ]
      effects:
      - !type:Extinguish
  plantMetabolism:
  - !type:PlantAdjustWater
    amount: 1
  tileReactions:
  - !type:ExtinguishTileReaction { }
  - !type:SpillIfPuddlePresentTileReaction { }

- type: reagent
  id: BaseSoda
  parent: BaseDrink
  abstract: true
  metabolisms:
    Digestion:
      effects:
      - !type:SatiateThirst
        factor: 2
  plantMetabolism:
  - !type:PlantAdjustNutrition
    amount: 0.1
  - !type:PlantAdjustWater
    amount: 0.1
  - !type:PlantAdjustHealth
    amount: -0.1
  footstepSound:
    collection: FootstepSlime
  fizziness: 0.5

- type: reagent
  id: BaseAlcohol
  group: Drinks
  abstract: true
  slipData:
    requiredSlipSpeed: 3.5
  friction: 0.4
  metabolisms:
    Digestion:
      metabolites:
        Ethanol: 0.12
      effects:
      - !type:SatiateThirst
        factor: 2
  reactiveEffects:
    Flammable:
      methods: [ Touch ]
      effects:
      - !type:Flammable
  tileReactions:
  - !type:FlammableTileReaction
    temperatureMultiplier: 1.35
  plantMetabolism:
  - !type:PlantAdjustNutrition
    amount: 0.25
  - !type:PlantAdjustWater
    amount: 0.7

- type: reagent
  id: BaseJuice
  parent: BaseDrink
  abstract: true
  flavor: sweet
  footstepSound:
    collection: FootstepSlime
