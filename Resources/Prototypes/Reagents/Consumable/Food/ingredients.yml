- type: reagent
  id: Flour
  name: reagent-name-flour
  group: Foods
  desc: reagent-desc-flour
  physicalDesc: reagent-physical-desc-powdery
  flavor: chalky
  color: white
  recognizable: true
  metabolisms:
    Digestion:
      metabolites:
        Sugar: 0.4
        Nutriment: 0.2
      effects:
      - !type:SatiateThirst
        factor: -0.2 #its flour

- type: reagent
  id: Cornmeal
  name: reagent-name-cornmeal
  group: Foods
  desc: reagent-desc-cornmeal
  physicalDesc: reagent-physical-desc-powdery
  flavor: corn #so corn doesnt taste chalky
  color: tan
  metabolisms:
    Digestion:
      metabolites:
        Nutriment: 0.2
      effects:
      - !type:SatiateThirst
        factor: -0.2 #its cornflour

