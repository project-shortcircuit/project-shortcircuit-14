- type: markingsGroup
  parent: Undergarments
  id: Vox
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      onlyGroupWhitelisted: true
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      onlyGroupWhitelisted: true
      required: false
    enum.HumanoidVisualLayers.Head:
      limit: 4
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: true
      default: [ VoxBeak ]
    enum.HumanoidVisualLayers.SnoutCover:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 2
      required: false
      default: [ VoxLArmScales ]
    enum.HumanoidVisualLayers.RArm:
      limit: 2
      required: false
      default: [ VoxRArmScales ]
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: true
      default: [ VoxLHandScales ]
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: true
      default: [ VoxRHandScales ]
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
      default: [ VoxLLegScales ]
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
      default: [ VoxRLegScales ]
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: true
      default: [ VoxLFootScales ]
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: true
      default: [ VoxRFootScales ]
    enum.HumanoidVisualLayers.Chest:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ VoxTail ]
    enum.HumanoidVisualLayers.TailOverlay:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.UndergarmentTop:
      limit: 1
      required: false
      nudityDefault: [ UndergarmentTopTanktopVox ]
    enum.HumanoidVisualLayers.UndergarmentBottom:
      limit: 1
      required: false
      nudityDefault: [ UndergarmentBottomBoxersVox ]

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceVox
  name: vox appearance
  components:
  - type: Inventory
    speciesId: vox
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vox/displacement.rsi
            state: jumpsuit
      eyes:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vox/displacement.rsi
            state: eyes
      gloves:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vox/displacement.rsi
            state: hand
      head:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vox/displacement.rsi
            state: head
      neck:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vox/displacement.rsi
            state: neck
      back:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vox/displacement.rsi
            state: back
      ears:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vox/displacement.rsi
            state: ears
      shoes:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vox/displacement.rsi
            state: shoes
  - type: Hands
    leftHandDisplacement:
      sizeMaps:
        32:
          sprite: Mobs/Species/Vox/displacement.rsi
          state: hand_l
    rightHandDisplacement:
      sizeMaps:
        32:
          sprite: Mobs/Species/Vox/displacement.rsi
          state: hand_r
  - type: InitialBody
    organs:
      Torso: OrganVoxTorso
      Head: OrganVoxHead
      ArmLeft: OrganVoxArmLeft
      ArmRight: OrganVoxArmRight
      HandRight: OrganVoxHandRight
      HandLeft: OrganVoxHandLeft
      LegLeft: OrganVoxLegLeft
      LegRight: OrganVoxLegRight
      FootLeft: OrganVoxFootLeft
      FootRight: OrganVoxFootRight
      Brain: OrganVoxBrain
      Eyes: OrganVoxEyes
      Tongue: OrganVoxTongue
      Appendix: OrganVoxAppendix
      Ears: OrganVoxEars
      Lungs: OrganVoxLungs
      Heart: OrganVoxHeart
      Stomach: OrganVoxStomach
      Liver: OrganVoxLiver
      Kidneys: OrganVoxKidneys
  - type: HumanoidProfile
    species: Vox

- type: entity
  parent:
  - AppearanceVox
  - BaseSpeciesMobOrganic
  id: MobVox
  name: Urist McVox
  components:
  - type: Damageable
    damageModifierSet: Vox
  - type: Speech
    speechVerb: Vox
    speechSounds: Vox
    allowedEmotes: ['Click', 'Chitter']
  - type: TypingIndicator
    proto: vox
  - type: Vocal
    sounds:
      Male: UnisexVox
      Female: UnisexVox
      Unsexed: UnisexVox
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 5
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTypeTrigger
        damageType: Blunt
        damage: 400
      behaviors:
      - !type:GibBehavior { }
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 1500
      behaviors:
      - !type:SpawnEntitiesBehavior
        spawnInContainer: true
        spawn:
          FoodMeatChickenFriedVox:
            min: 3
            max: 5
      - !type:BurnBodyBehavior
        popupMessage: bodyburn-vox-text-others
      - !type:PlaySoundBehavior
        sound:
          collection: MeatLaserImpact
    - trigger:
        !type:DamageTypeTrigger
        damageType: Radiation
        damage: 15
      behaviors:
      - !type:PopupBehavior
        popup: mouth-taste-metal
        popupType: LargeCaution
        targetOnly: true
    - trigger:
        !type:DamageTypeTrigger
        damageType: Radiation
        damage: 40
      behaviors:
      - !type:VomitBehavior
  - type: PassiveDamage
    # Augment normal health regen to be able to tank some Poison damage
    # This allows Vox to take their mask off temporarily to eat something without needing a trip to medbay afterwards.
    allowedStates:
    - Alive
    damage:
      types:
        Heat: -0.07
        Blunt: -0.05
        Piercing: -0.05
        Slash: -0.05
        Poison: -0.2 # needs to be less than the PendingZombieComponent does or they never become zombies by the disease.
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#7a8bf2"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: AmmoniaBlood
        Quantity: 300
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5 # Reduce?
  - type: Wagging

- type: entity
  parent: OrganBase
  id: OrganVox
