# Jumpsuit
- type: loadout
  id: ReporterJumpsuit
  equipment:
    jumpsuit: ClothingUniformJumpsuitReporter

- type: loadout
  id: JournalistJumpsuit
  equipment:
    jumpsuit: ClothingUniformJumpsuitJournalist

# Head
- type: loadout
  id: ReporterPressFedora
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobReporter
      time: 10h
  equipment:
    head: ClothingHeadHatFedoraPress

# Outerclothing
- type: loadout
  id: ReporterPressVest
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobReporter
      time: 35h
  equipment:
    outerClothing: ClothingOuterVestPress
